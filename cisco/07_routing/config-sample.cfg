! =========================================================
! Contoh konfigurasi - Static route + OSPF sederhana
! Modul 07 - Routing
! =========================================================

! ---- R1 ----
Router> enable
Router# configure terminal
Router(config)# hostname R1

R1(config)# interface gigabitEthernet 0/0
R1(config-if)# ip address 192.168.10.1 255.255.255.0
R1(config-if)# no shutdown
R1(config-if)# exit

R1(config)# interface serial 0/0/0
R1(config-if)# ip address 10.0.0.1 255.255.255.252
R1(config-if)# clock rate 64000
R1(config-if)# no shutdown
R1(config-if)# exit

! Static route ke subnet di balik R2
R1(config)# ip route 192.168.30.0 255.255.255.0 10.0.0.2

R1(config)# end
R1# write memory

! ---- Alternatif: pakai OSPF (tinggal pilih salah satu, jangan dua-duanya
!      untuk network yang sama supaya tidak konflik) ----
R1# enable
R1# configure terminal
R1(config)# router ospf 1
R1(config-router)# network 192.168.10.0 0.0.0.255 area 0
R1(config-router)# network 10.0.0.0 0.0.0.3 area 0
R1(config-router)# exit

R1(config)# end
R1# write memory

