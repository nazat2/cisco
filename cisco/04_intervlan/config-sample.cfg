! =========================================================
! Contoh konfigurasi - Router-on-a-Stick
! Modul 04 - Inter-VLAN Routing
! =========================================================

! ---- Router R1 ----
Router> enable
Router# configure terminal
Router(config)# hostname R1

R1(config)# interface gigabitEthernet 0/0
R1(config-if)# no shutdown
R1(config-if)# exit

R1(config)# interface gigabitEthernet 0/0.10
R1(config-if)# encapsulation dot1Q 10
R1(config-if)# ip address 192.168.10.1 255.255.255.0
R1(config-if)# exit

R1(config)# interface gigabitEthernet 0/0.20
R1(config-if)# encapsulation dot1Q 20
R1(config-if)# ip address 192.168.20.1 255.255.255.0
R1(config-if)# exit

R1(config)# interface gigabitEthernet 0/0.99
R1(config-if)# encapsulation dot1Q 99 native
R1(config-if)# ip address 192.168.99.1 255.255.255.0
R1(config-if)# exit

R1(config)# end
R1# write memory

! ---- Switch SW1 (port ke router jadi trunk) ----
Switch> enable
Switch# configure terminal
Switch(config)# hostname SW1

SW1(config)# interface fastEthernet 0/24
SW1(config-if)# switchport trunk encapsulation dot1q
SW1(config-if)# switchport mode trunk
SW1(config-if)# switchport trunk native vlan 99
SW1(config-if)# exit

SW1(config)# end
SW1# write memory
