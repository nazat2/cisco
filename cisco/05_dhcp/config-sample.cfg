! =========================================================
! Contoh konfigurasi - DHCP server untuk 2 VLAN
! Modul 05 - DHCP
! =========================================================

Router> enable
Router# configure terminal
Router(config)# hostname R1

R1(config)# ip dhcp excluded-address 192.168.10.1 192.168.10.10
R1(config)# ip dhcp excluded-address 192.168.20.1 192.168.20.10

R1(config)# ip dhcp pool VLAN10_DATA
R1(config-dhcp)# network 192.168.10.0 255.255.255.0
R1(config-dhcp)# default-router 192.168.10.1
R1(config-dhcp)# dns-server 8.8.8.8
R1(config-dhcp)# lease 7
R1(config-dhcp)# exit

R1(config)# ip dhcp pool VLAN20_VOICE
R1(config-dhcp)# network 192.168.20.0 255.255.255.0
R1(config-dhcp)# default-router 192.168.20.1
R1(config-dhcp)# dns-server 8.8.8.8
R1(config-dhcp)# lease 7
R1(config-dhcp)# exit

R1(config)# end
R1# write memory

