! =========================================================
! Konfigurasi gabungan - 1 lab utuh (2 switch + 1 router)
! Topologi: PC -- SW1 -- (trunk) -- SW2 -- (trunk) -- R1 -- Internet
! =========================================================

! ============ R1 ============
Router> enable
Router# configure terminal
Router(config)# hostname R1
R1(config)# interface gigabitEthernet 0/0
R1(config-if)# no shutdown
R1(config-if)# exit
R1(config)# interface gigabitEthernet 0/0.10
R1(config-if)# encapsulation dot1Q 10
R1(config-if)# ip address 192.168.10.1 255.255.255.0
R1(config-if)# exit
R1(config)# interface gigabitEthernet 0/0.20
R1(config-if)# encapsulation dot1Q 20
R1(config-if)# ip address 192.168.20.1 255.255.255.0
R1(config-if)# exit
R1(config)# ip route 0.0.0.0 0.0.0.0 203.0.113.1
R1(config)# end
R1# write memory

! ============ SW1 (distribution, ke router) ============
Switch> enable
Switch# configure terminal
Switch(config)# hostname SW1
SW1(config)# vlan 10
SW1(config-vlan)# name DATA
SW1(config-vlan)# exit
SW1(config)# vlan 20
SW1(config-vlan)# name VOICE
SW1(config-vlan)# exit
SW1(config)# interface gigabitEthernet 0/1
SW1(config-if)# switchport mode trunk
SW1(config-if)# exit
SW1(config)# interface gigabitEthernet 0/2
SW1(config-if)# switchport mode trunk
SW1(config-if)# exit
SW1(config)# end
SW1# write memory

! ============ SW2 (access, ke PC) ============
Switch> enable
Switch# configure terminal
Switch(config)# hostname SW2
SW2(config)# vlan 10
SW2(config-vlan)# name DATA
SW2(config-vlan)# exit
SW2(config)# vlan 20
SW2(config-vlan)# name VOICE
SW2(config-vlan)# exit
SW2(config)# interface gigabitEthernet 0/1
SW2(config-if)# switchport mode trunk
SW2(config-if)# exit
SW2(config)# interface range fastEthernet 0/1 - 12
SW2(config-if-range)# switchport mode access
SW2(config-if-range)# switchport access vlan 10
SW2(config-if-range)# exit
SW2(config)# end
SW2# write memory
