! =========================================================
! Template dasar - Router Gateway
! =========================================================
Router> enable
Router# configure terminal
Router(config)# hostname GW-R1
GW-R1(config)# no ip domain-lookup
GW-R1(config)# enable secret cisco123
GW-R1(config)# service password-encryption

GW-R1(config)# interface gigabitEthernet 0/0
GW-R1(config-if)# no shutdown
GW-R1(config-if)# exit

GW-R1(config)# interface gigabitEthernet 0/0.10
GW-R1(config-if)# encapsulation dot1Q 10
GW-R1(config-if)# ip address 192.168.10.1 255.255.255.0
GW-R1(config-if)# exit

GW-R1(config)# interface gigabitEthernet 0/0.20
GW-R1(config-if)# encapsulation dot1Q 20
GW-R1(config-if)# ip address 192.168.20.1 255.255.255.0
GW-R1(config-if)# exit

GW-R1(config)# interface gigabitEthernet 0/0.99
GW-R1(config-if)# encapsulation dot1Q 99 native
GW-R1(config-if)# ip address 192.168.99.1 255.255.255.0
GW-R1(config-if)# exit

GW-R1(config)# ip dhcp excluded-address 192.168.10.1 192.168.10.10
GW-R1(config)# ip dhcp pool VLAN10_DATA
GW-R1(config-dhcp)# network 192.168.10.0 255.255.255.0
GW-R1(config-dhcp)# default-router 192.168.10.1
GW-R1(config-dhcp)# dns-server 8.8.8.8
GW-R1(config-dhcp)# exit

GW-R1(config)# ip route 0.0.0.0 0.0.0.0 203.0.113.1

GW-R1(config)# end
GW-R1# write memory

