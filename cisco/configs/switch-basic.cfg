! =========================================================
! Template dasar - Access Layer Switch
! =========================================================
Switch> enable
Switch# configure terminal
Switch(config)# hostname ACCESS-SW1
ACCESS-SW1(config)# no ip domain-lookup
ACCESS-SW1(config)# enable secret cisco123
ACCESS-SW1(config)# service password-encryption

ACCESS-SW1(config)# vlan 10
ACCESS-SW1(config-vlan)# name DATA
ACCESS-SW1(config-vlan)# exit
ACCESS-SW1(config)# vlan 20
ACCESS-SW1(config-vlan)# name VOICE
ACCESS-SW1(config-vlan)# exit
ACCESS-SW1(config)# vlan 99
ACCESS-SW1(config-vlan)# name MANAGEMENT
ACCESS-SW1(config-vlan)# exit

ACCESS-SW1(config)# interface range fastEthernet 0/1 - 20
ACCESS-SW1(config-if-range)# switchport mode access
ACCESS-SW1(config-if-range)# switchport access vlan 10
ACCESS-SW1(config-if-range)# switchport voice vlan 20
ACCESS-SW1(config-if-range)# spanning-tree portfast
ACCESS-SW1(config-if-range)# exit

ACCESS-SW1(config)# interface gigabitEthernet 0/1
ACCESS-SW1(config-if)# switchport trunk encapsulation dot1q
ACCESS-SW1(config-if)# switchport mode trunk
ACCESS-SW1(config-if)# switchport trunk native vlan 99
ACCESS-SW1(config-if)# switchport nonegotiate
ACCESS-SW1(config-if)# exit

ACCESS-SW1(config)# interface vlan99
ACCESS-SW1(config-if)# ip address 192.168.99.2 255.255.255.0
ACCESS-SW1(config-if)# no shutdown
ACCESS-SW1(config-if)# exit

ACCESS-SW1(config)# ip default-gateway 192.168.99.1

ACCESS-SW1(config)# line vty 0 15
ACCESS-SW1(config-line)# password cisco123
ACCESS-SW1(config-line)# login
ACCESS-SW1(config-line)# transport input ssh telnet
ACCESS-SW1(config-line)# exit

ACCESS-SW1(config)# end
ACCESS-SW1# write memory

