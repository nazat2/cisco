! ============================================
! RIPv2 — 2 router, network classless VLSM
! ============================================

router rip
 version 2
 network 192.168.10.0
 network 10.0.0.0
 no auto-summary
 passive-interface gigabitEthernet 0/1
 exit

! Verifikasi
do show ip protocols
do show ip route rip
