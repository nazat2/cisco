! ============================================
! EIGRP — AS 100, 2 router
! ============================================

router eigrp 100
 network 192.168.10.0 0.0.0.255
 network 10.0.0.0 0.0.0.3
 no auto-summary
 eigrp router-id 1.1.1.1
 exit

! Verifikasi
do show ip eigrp neighbors
do show ip eigrp topology
do show ip route eigrp
