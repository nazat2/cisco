! ============================================
! Static Route — R1 & R2 saling terhubung via serial
! ============================================

! --- Di R1 ---
ip route 192.168.20.0 255.255.255.0 10.0.0.2

! --- Di R2 ---
ip route 192.168.10.0 255.255.255.0 10.0.0.1

! Default route mengarah ke ISP (di router paling luar/edge)
ip route 0.0.0.0 0.0.0.0 203.0.113.1

! Floating static route (backup, AD dinaikkan jadi 200)
ip route 192.168.20.0 255.255.255.0 10.0.1.2 200

! Verifikasi
do show ip route static
