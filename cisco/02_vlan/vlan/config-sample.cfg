! =========================================================
! Contoh konfigurasi - Switch dengan 3 VLAN
! Modul 02 - VLAN
! =========================================================

Switch> enable
Switch# configure terminal
Switch(config)# hostname SW1

SW1(config)# vlan 10
SW1(config-vlan)# name DATA
SW1(config-vlan)# exit
SW1(config)# vlan 20
SW1(config-vlan)# name VOICE
SW1(config-vlan)# exit
SW1(config)# vlan 99
SW1(config-vlan)# name MANAGEMENT
SW1(config-vlan)# exit

! Port ke PC staff -> VLAN 10 (Data)
SW1(config)# interface range fastEthernet 0/1 - 10
SW1(config-if-range)# switchport mode access
SW1(config-if-range)# switchport access vlan 10
SW1(config-if-range)# exit

! Port ke IP Phone + PC -> VLAN 10 data, VLAN 20 voice
SW1(config)# interface fastEthernet 0/11
SW1(config-if)# switchport mode access
SW1(config-if)# switchport access vlan 10
SW1(config-if)# switchport voice vlan 20
SW1(config-if)# exit

! Interface management switch
SW1(config)# interface vlan99
SW1(config-if)# ip address 192.168.99.2 255.255.255.0
SW1(config-if)# no shutdown
SW1(config-if)# exit

SW1(config)# ip default-gateway 192.168.99.1

SW1(config)# end
SW1# write memory
