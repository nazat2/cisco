! =========================================================
! Contoh konfigurasi - Trunk antar 2 switch
! Modul 03 - Trunking
! =========================================================

! ---- SW1 ----
Switch> enable
Switch# configure terminal
Switch(config)# hostname SW1

SW1(config)# vlan 10
SW1(config-vlan)# name DATA
SW1(config-vlan)# exit
SW1(config)# vlan 20
SW1(config-vlan)# name VOICE
SW1(config-vlan)# exit
SW1(config)# vlan 999
SW1(config-vlan)# name NATIVE_UNUSED
SW1(config-vlan)# exit

SW1(config)# interface gigabitEthernet 0/1
SW1(config-if)# switchport trunk encapsulation dot1q
SW1(config-if)# switchport mode trunk
SW1(config-if)# switchport trunk native vlan 999
SW1(config-if)# switchport trunk allowed vlan 10,20
SW1(config-if)# switchport nonegotiate
SW1(config-if)# exit

SW1(config)# end
SW1# write memory

! ---- SW2 (konfigurasi harus SAMA persis untuk native VLAN) ----
Switch> enable
Switch# configure terminal
Switch(config)# hostname SW2

SW2(config)# vlan 10
SW2(config-vlan)# name DATA
SW2(config-vlan)# exit
SW2(config)# vlan 20
SW2(config-vlan)# name VOICE
SW2(config-vlan)# exit
SW2(config)# vlan 999
SW2(config-vlan)# name NATIVE_UNUSED
SW2(config-vlan)# exit

SW2(config)# interface gigabitEthernet 0/1
SW2(config-if)# switchport trunk encapsulation dot1q
SW2(config-if)# switchport mode trunk
SW2(config-if)# switchport trunk native vlan 999
SW2(config-if)# switchport trunk allowed vlan 10,20
SW2(config-if)# switchport nonegotiate
SW2(config-if)# exit

SW2(config)# end
SW2# write memory
