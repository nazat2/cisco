! ============================================
! PPP + CHAP authentication — R1 & R2
! ============================================

! --- Di R1 (hostname R1) ---
hostname R1
username R2 password cisco123

interface serial 0/0/0
 encapsulation ppp
 ppp authentication chap
 ip address 10.0.0.1 255.255.255.252
 no shutdown
 exit

! --- Di R2 (hostname R2) ---
hostname R2
username R1 password cisco123

interface serial 0/0/0
 encapsulation ppp
 ppp authentication chap
 ip address 10.0.0.2 255.255.255.252
 no shutdown
 exit

! Verifikasi
do show interfaces serial 0/0/0
