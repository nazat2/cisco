! ============================================
! Serial WAN — sisi DCE (R1) & DTE (R2)
! ============================================

! --- Di R1 (sisi DCE) ---
interface serial 0/0/0
 description Link ke R2 - kantor cabang
 ip address 10.0.0.1 255.255.255.252
 clock rate 64000
 bandwidth 64
 no shutdown
 exit

! --- Di R2 (sisi DTE) ---
interface serial 0/0/0
 description Link ke R1 - kantor pusat
 ip address 10.0.0.2 255.255.255.252
 bandwidth 64
 no shutdown
 exit

! Verifikasi (di kedua router)
do show interfaces serial 0/0/0
do show controllers serial 0/0/0
