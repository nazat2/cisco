! =========================================================
! Contoh konfigurasi - Standard & Extended ACL
! Modul 06 - ACL
! =========================================================

Router> enable
Router# configure terminal
Router(config)# hostname R1

! Standard ACL: blok 1 host spesifik akses semua, taruh dekat destination
R1(config)# access-list 10 deny host 192.168.20.5
R1(config)# access-list 10 permit any

R1(config)# interface gigabitEthernet 0/2
R1(config-if)# ip access-group 10 out
R1(config-if)# exit

! Extended ACL (named): blok HTTP dari VLAN10 ke server tertentu
R1(config)# ip access-list extended BLOCK_HTTP_TO_SERVER
R1(config-ext-nacl)# deny tcp 192.168.10.0 0.0.0.255 host 192.168.30.10 eq 80
R1(config-ext-nacl)# permit ip any any
R1(config-ext-nacl)# exit

R1(config)# interface gigabitEthernet 0/0
R1(config-if)# ip access-group BLOCK_HTTP_TO_SERVER in
R1(config-if)# exit

R1(config)# end
R1# write memory
