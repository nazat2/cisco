! ============================================
! DNS — client config di router + entri statis lokal
! ============================================

ip domain-lookup
ip name-server 8.8.8.8 192.168.100.53

! Entri statis lokal (tanpa DNS server sungguhan)
ip host server1.kantor.local 192.168.10.10
ip host web.kantor.local 192.168.10.20

! Verifikasi
do show hosts
do ping server1.kantor.local
