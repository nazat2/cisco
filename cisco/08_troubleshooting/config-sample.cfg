! =========================================================
! Kumpulan perintah diagnosa (bukan config, kumpulan "show"/"debug")
! Modul 08 - Troubleshooting
! =========================================================

! Semua perintah show/debug dijalankan di Privileged EXEC
Router> enable

! --- Langkah 1: cek status interface ---
Router# show ip interface brief

! --- Langkah 2: cek Layer 2 (VLAN, trunk, MAC table) ---
Router# show vlan brief
Router# show interfaces trunk
Router# show mac address-table

! --- Langkah 3: cek Layer 3 (routing) ---
Router# show ip route
Router# ping 192.168.20.10
Router# traceroute 192.168.30.10

! --- Langkah 4: cek detail error di satu interface ---
Router# show interfaces gigabitEthernet 0/1

! --- Langkah 5: cek konfigurasi aktif untuk bandingkan dengan baseline ---
Router# show running-config

! --- Debug (pakai hati-hati, bisa membebani CPU perangkat produksi) ---
Router# debug ip icmp
Router# no debug all

