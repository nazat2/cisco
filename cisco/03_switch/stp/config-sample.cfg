! ============================================
! STP — Spanning Tree Protocol
! ============================================

! Aktifkan Rapid-PVST (disarankan)
spanning-tree mode rapid-pvst

! Jadikan switch ini root bridge untuk VLAN 1 & 10
spanning-tree vlan 1,10 priority 4096

! Port ke arah end-device (PC) — PortFast + BPDU Guard
interface fastEthernet 0/1
 switchport mode access
 spanning-tree portfast
 spanning-tree bpduguard enable
 exit

! Verifikasi
do show spanning-tree vlan 10
do show spanning-tree interface fa0/1
