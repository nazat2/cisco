! ============================================
! Simulasi Jaringan Perusahaan — cuplikan konfigurasi router HQ
! (gabungan intervlan + dhcp + acl + nat + routing ke cabang)
! ============================================

! --- VLAN & Inter-VLAN (router-on-a-stick) ---
interface gigabitEthernet 0/0.10
 encapsulation dot1Q 10
 ip address 192.168.10.1 255.255.255.0
 exit
interface gigabitEthernet 0/0.20
 encapsulation dot1Q 20
 ip address 192.168.20.1 255.255.255.0
 exit
interface gigabitEthernet 0/0.30
 encapsulation dot1Q 30
 ip address 192.168.30.1 255.255.255.0
 exit

! --- DHCP per VLAN ---
ip dhcp excluded-address 192.168.10.1 192.168.10.10
ip dhcp pool VLAN10_IT
 network 192.168.10.0 255.255.255.0
 default-router 192.168.10.1
 dns-server 8.8.8.8
 exit

! --- ACL: Finance (VLAN20) hanya boleh diakses dari IT (VLAN10) ---
access-list 120 permit ip 192.168.10.0 0.0.0.255 192.168.20.0 0.0.0.255
access-list 120 deny ip any 192.168.20.0 0.0.0.255
access-list 120 permit ip any any
interface gigabitEthernet 0/0.20
 ip access-group 120 in
 exit

! --- Link WAN ke kantor cabang (PPP CHAP) ---
username CABANG password cisco123
interface serial 0/0/0
 encapsulation ppp
 ppp authentication chap
 ip address 10.0.0.1 255.255.255.252
 no shutdown
 exit

! --- Routing ke subnet cabang ---
ip route 192.168.40.0 255.255.255.0 10.0.0.2

! --- NAT/PAT menghadap ISP ---
interface gigabitEthernet 0/1
 ip nat outside
 exit
interface gigabitEthernet 0/0
 ip nat inside
 exit
access-list 1 permit 192.168.0.0 0.0.255.255
ip nat inside source list 1 interface gigabitEthernet 0/1 overload

! Verifikasi keseluruhan
do show vlan brief
do show ip route
do show ip nat translations
do show access-lists
